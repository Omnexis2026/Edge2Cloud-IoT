; ESP-IDF firmware — Wi‑Fi + MQTT to Mosquitto (home/{homeId}/device/{deviceId}/…)
; Use `main/` (not `src/`) so Kconfig.projbuild is merged; see PlatformIO ESP-IDF "rename main".
[platformio]
src_dir = main

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
